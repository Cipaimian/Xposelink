# Xposelink production stack
#
# Usage:
#   1. cp .env.example .env  → edit with real values
#      For Docker, set DB_HOST=mysql (not localhost) so the backend
#      container reaches the mysql service.
#   2. Point xposelink.site + api.xposelink.site A records to this server IP
#   3. docker compose up -d --build
#   4. Caddy will auto-issue Let's Encrypt certs on first request
#
# Ports exposed to the host: 80, 443 (Caddy only)
# All other services talk to each other via the `xposenet` internal network.
# Docker auto-loads .env from this directory — no --env-file flag needed.

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - xposenet

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY}
      PHISHTANK_API_KEY: ${PHISHTANK_API_KEY}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
      MIDTRANS_IS_PRODUCTION: ${MIDTRANS_IS_PRODUCTION}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
    networks:
      - xposenet

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.xposelink.site}
    restart: unless-stopped
    networks:
      - xposenet

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # Host ports: override CADDY_HTTP_PORT / CADDY_HTTPS_PORT in .env if 80/443
    # are already taken on the host (e.g. another reverse proxy is running).
    # When using non-standard ports, you'll need a front proxy on the host that
    # forwards xposelink.site → 127.0.0.1:${CADDY_HTTP_PORT} (and HTTPS).
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - xposenet

volumes:
  mysql_data:
  caddy_data:
  caddy_config:

networks:
  xposenet:
    driver: bridge
