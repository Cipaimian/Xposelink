server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Force UTF-8 charset on all text responses (∞, ·, emoji, etc.)
    charset utf-8;
    charset_types text/html text/css application/javascript application/json image/svg+xml;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;

    # Assets use clean (non-hashed) filenames, so we can't cache forever —
    # browser must revalidate via ETag on every load to pick up new builds.
    location /assets/ {
        expires off;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        etag on;
    }

    # SPA fallback: serve index.html for any unknown path so React Router works
    location / {
        try_files $uri /index.html;
    }
}
